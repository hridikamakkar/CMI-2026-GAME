<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMI Arcade Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <section id="start-screen" class="screen active">
      <p class="eyebrow">Chennai Mathematical Institute</p>
      <h1>CMI Arcade Quiz</h1>
      <p class="intro">Race the clock through math and computer science questions. Correct answers build your score. Misses cost lives.</p>
      <button id="start-button" class="primary-button">Start Game</button>
    </section>

    <section id="game-screen" class="screen">
      <header class="hud" aria-label="Game status">
        <div>
          <span>Score</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span>Lives</span>
          <strong id="lives">3</strong>
        </div>
        <div>
          <span>Level</span>
          <strong id="level">1</strong>
        </div>
        <div>
          <span>Time</span>
          <strong id="timer">20</strong>
        </div>
      </header>

      <div class="quiz-card">
        <div class="question-meta">
          <span id="category">Math</span>
          <span id="question-count">Question 1</span>
        </div>
        <h2 id="question">Question text</h2>
        <div id="answers" class="answer-grid" aria-label="Answer choices"></div>
        <p id="feedback" class="feedback" aria-live="polite"></p>
      </div>
    </section>

    <section id="game-over-screen" class="screen">
      <p class="eyebrow">Game Over</p>
      <h1 id="result-title">Final Score</h1>
      <p id="final-score" class="final-score">0</p>
      <p id="result-message" class="intro">Ready for another run?</p>
      <button id="restart-button" class="primary-button">Restart</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
